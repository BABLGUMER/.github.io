<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AniTrack</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--tg-theme-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #1a1a1a);
            padding-bottom: 75px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 16px;
            color: white;
            margin-bottom: 16px;
        }

        .header h1 { font-size: 24px; margin-bottom: 4px; }
        .header p { font-size: 13px; opacity: 0.9; }

        .add-section {
            padding: 0 16px 16px;
        }

        .add-box {
            background: var(--tg-theme-secondary-bg-color, white);
            border-radius: 12px;
            display: flex;
            gap: 8px;
            padding: 8px;
        }

        .add-box input {
            flex: 1;
            padding: 10px 12px;
            border: none;
            border-radius: 10px;
            background: var(--tg-theme-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000);
            font-size: 15px;
            outline: none;
        }

        .add-box button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .tabs {
            display: flex;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tg-theme-secondary-bg-color, rgba(255,255,255,0.95));
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,0,0,0.1);
            padding: 8px 0 12px;
            justify-content: space-around;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
            color: #666;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tab-btn.active {
            color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }

        .tab-icon { font-size: 22px; }
        .tab-content { display: none; padding: 0 16px 80px; }
        .tab-content.active { display: block; }

        .anime-card {
            background: var(--tg-theme-secondary-bg-color, white);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 12px;
        }

        .anime-title { font-size: 16px; font-weight: bold; margin-bottom: 6px; }
        .anime-status { font-size: 11px; color: #667eea; margin-bottom: 10px; }
        .anime-rating {
            display: inline-block;
            background: #ffd700;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .card-buttons { display: flex; gap: 8px; margin-top: 10px; }
        .card-buttons button {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            border: none;
            cursor: pointer;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-danger { background: #ff4757; color: white; }

        .empty-state { text-align: center; padding: 50px 20px; color: #888; }
        .empty-state span { font-size: 48px; display: block; margin-bottom: 12px; }

        .toast {
            position: fixed;
            bottom: 90px;
            left: 16px;
            right: 16px;
            background: #2ed573;
            color: white;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.error { background: #ff4757; }
    </style>
</head>
<body>

<div class="header">
    <h1>🎬 AniTrack</h1>
    <p>Твой аниме-трекер</p>
</div>

<div class="add-section">
    <div class="add-box">
        <input type="text" id="anime-name" placeholder="Введи название аниме...">
        <button id="add-btn">➕ Добавить</button>
    </div>
</div>

<div class="tabs">
    <button class="tab-btn active" data-tab="plan"><span class="tab-icon">📋</span><span>В планах</span></button>
    <button class="tab-btn" data-tab="watching"><span class="tab-icon">🎬</span><span>Смотрю</span></button>
    <button class="tab-btn" data-tab="completed"><span class="tab-icon">✅</span><span>Просмотрено</span></button>
</div>

<div id="plan" class="tab-content active"><div id="plan-list"></div></div>
<div id="watching" class="tab-content"><div id="watching-list"></div></div>
<div id="completed" class="tab-content"><div id="completed-list"></div></div>

<div id="toast" class="toast"></div>

<script src="https://telegram.org/js/telegram-web-app.js?56"></script>
<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    
    let userId = tg.initDataUnsafe?.user?.id || 'anonymous';
    
    function showToast(text, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent = text;
        toast.className = isError ? 'toast error' : 'toast';
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 1500);
    }
    
    async function loadData() {
        try {
            const key = `anime_list_${userId}`;
            const raw = await tg.CloudStorage.getItem(key);
            if (raw) return JSON.parse(raw);
        } catch(e) { console.log('load error', e); }
        return { plan: [], watching: [], completed: [] };
    }
    
    async function saveData(data) {
        try {
            const key = `anime_list_${userId}`;
            await tg.CloudStorage.setItem(key, JSON.stringify(data));
            await renderLists();
            return true;
        } catch(e) {
            console.log('save error', e);
            showToast('Ошибка сохранения: ' + e.message, true);
            return false;
        }
    }
    
    async function addAnime() {
        const input = document.getElementById('anime-name');
        const title = input.value.trim();
        
        if (!title) {
            showToast('Введи название аниме!', true);
            return;
        }
        
        const data = await loadData();
        
        // Проверка на дубликат
        const exists = [...data.plan, ...data.watching, ...data.completed].some(a => a.title === title);
        if (exists) {
            showToast(`❌ "${title}" уже есть!`, true);
            return;
        }
        
        data.plan.push({
            id: Date.now(),
            title: title,
            addedDate: new Date().toLocaleString('ru-RU')
        });
        
        await saveData(data);
        input.value = '';
        showToast(`✅ "${title}" добавлено!`);
        
        // Переключаемся на вкладку "В планах"
        document.querySelector('[data-tab="plan"]').click();
    }
    
    async function renderLists() {
        const data = await loadData();
        console.log('Рендерим списки:', data);
        
        // В планах
        const planDiv = document.getElementById('plan-list');
        if (data.plan.length === 0) {
            planDiv.innerHTML = '<div class="empty-state"><span>📭</span><br>Нет аниме в планах<br>Добавь выше!</div>';
        } else {
            planDiv.innerHTML = data.plan.map((item, idx) => `
                <div class="anime-card">
                    <div class="anime-title">${escapeHtml(item.title)}</div>
                    <div class="anime-status">📅 Добавлено: ${item.addedDate}</div>
                    <div class="card-buttons">
                        <button class="btn-primary" onclick="moveToWatching(${idx})">🎬 Начать</button>
                        <button class="btn-danger" onclick="deleteAnime('plan', ${idx})">🗑 Удалить</button>
                    </div>
                </div>
            `).join('');
        }
        
        // Смотрю
        const watchingDiv = document.getElementById('watching-list');
        if (data.watching.length === 0) {
            watchingDiv.innerHTML = '<div class="empty-state"><span>🎬</span><br>Нет аниме в процессе</div>';
        } else {
            watchingDiv.innerHTML = data.watching.map((item, idx) => `
                <div class="anime-card">
                    <div class="anime-title">${escapeHtml(item.title)}</div>
                    <div class="anime-status">▶️ Начато: ${item.startDate || item.addedDate}</div>
                    <div class="card-buttons">
                        <button class="btn-primary" onclick="completeAnime(${idx})">✅ Завершить</button>
                        <button class="btn-danger" onclick="deleteAnime('watching', ${idx})">🗑 Удалить</button>
                    </div>
                </div>
            `).join('');
        }
        
        // Просмотрено
        const completedDiv = document.getElementById('completed-list');
        if (data.completed.length === 0) {
            completedDiv.innerHTML = '<div class="empty-state"><span>✅</span><br>Здесь будут просмотренные</div>';
        } else {
            completedDiv.innerHTML = data.completed.map((item, idx) => `
                <div class="anime-card">
                    <div class="anime-title">${escapeHtml(item.title)}</div>
                    <div class="anime-rating">⭐ ${item.rating || '?'}/10</div>
                    ${item.review ? `<div class="anime-review">💬 ${escapeHtml(item.review)}</div>` : ''}
                    <div class="anime-status">✅ Завершено: ${item.completedDate}</div>
                    <div class="card-buttons">
                        <button class="btn-danger" onclick="deleteAnime('completed', ${idx})">🗑 Удалить</button>
                    </div>
                </div>
            `).join('');
        }
    }
    
    window.moveToWatching = async (idx) => {
        const data = await loadData();
        const anime = data.plan[idx];
        data.watching.push({ ...anime, startDate: new Date().toLocaleString('ru-RU') });
        data.plan.splice(idx, 1);
        await saveData(data);
        showToast(`🎬 "${anime.title}" — в процессе!`);
    };
    
    window.completeAnime = async (idx) => {
        const data = await loadData();
        const anime = data.watching[idx];
        
        let rating = prompt('⭐ Оценка от 1 до 10:', '8');
        while (rating && (isNaN(rating) || rating < 1 || rating > 10)) {
            rating = prompt('Оценка от 1 до 10:', '8');
        }
        
        const review = prompt('✍️ Твоё мнение:', '');
        
        data.completed.push({
            ...anime,
            rating: rating || '?',
            review: review || 'Без отзыва',
            completedDate: new Date().toLocaleString('ru-RU')
        });
        data.watching.splice(idx, 1);
        await saveData(data);
        showToast(`✅ "${anime.title}" в просмотренных!`);
    };
    
    window.deleteAnime = async (list, idx) => {
        const data = await loadData();
        const title = data[list][idx].title;
        data[list].splice(idx, 1);
        await saveData(data);
        showToast(`🗑 "${title}" удалено`);
    };
    
    document.getElementById('add-btn').addEventListener('click', addAnime);
    document.getElementById('anime-name').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addAnime();
    });
    
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const tabId = btn.dataset.tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        });
    });
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    renderLists();
    showToast('✏️ Введи название и нажми Добавить');
</script>
</body>
</html>
