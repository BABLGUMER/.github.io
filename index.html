<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Тест AniTrack</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .test-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 12px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .result {
            background: #e8f5e9;
            padding: 12px;
            border-radius: 12px;
            margin-top: 12px;
            display: none;
        }
        .result.show { display: block; }
        .list-item {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 8px;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="test-card">
    <h2>🎬 Тест AniTrack</h2>
    <p>Проверяем, работает ли кнопка "Добавить"</p>
</div>

<div class="test-card">
    <input type="text" id="animeInput" placeholder="Введи название аниме...">
    <button id="addButton">➕ ДОБАВИТЬ</button>
    <div id="result" class="result"></div>
</div>

<div class="test-card">
    <h3>📋 Твой список (временный)</h3>
    <div id="tempList"></div>
</div>

<script>
    // Простой массив для хранения (временно, в памяти)
    let tempAnimeList = [];
    
    function showMessage(text, isError = false) {
        const resultDiv = document.getElementById('result');
        resultDiv.textContent = text;
        resultDiv.style.background = isError ? '#ffebee' : '#e8f5e9';
        resultDiv.style.color = isError ? '#c62828' : '#2e7d32';
        resultDiv.classList.add('show');
        setTimeout(() => {
            resultDiv.classList.remove('show');
        }, 2000);
    }
    
    function renderTempList() {
        const container = document.getElementById('tempList');
        if (tempAnimeList.length === 0) {
            container.innerHTML = '<p style="color: #999;">Пока ничего нет. Добавь аниме выше!</p>';
        } else {
            container.innerHTML = tempAnimeList.map((item, idx) => `
                <div class="list-item">
                    <strong>${escapeHtml(item.title)}</strong>
                    <br>✅ Добавлено: ${item.date}
                    <br><button onclick="removeItem(${idx})" style="margin-top:8px; background:#ff4757; padding:6px 12px; font-size:12px;">🗑 Удалить</button>
                </div>
            `).join('');
        }
    }
    
    function addAnime() {
        const input = document.getElementById('animeInput');
        const title = input.value.trim();
        
        if (!title) {
            showMessage('❌ Введи название аниме!', true);
            return;
        }
        
        // Проверка на дубликат
        if (tempAnimeList.some(a => a.title === title)) {
            showMessage(`❌ "${title}" уже есть в списке!`, true);
            return;
        }
        
        tempAnimeList.push({
            title: title,
            date: new Date().toLocaleString('ru-RU')
        });
        
        input.value = '';
        renderTempList();
        showMessage(`✅ "${title}" добавлено в список!`);
    }
    
    function removeItem(index) {
        const title = tempAnimeList[index].title;
        tempAnimeList.splice(index, 1);
        renderTempList();
        showMessage(`🗑 "${title}" удалено`);
    }
    
    window.removeItem = removeItem;
    
    document.getElementById('addButton').addEventListener('click', addAnime);
    document.getElementById('animeInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addAnime();
    });
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    renderTempList();
    console.log('Тестовая страница загружена, всё готово!');
</script>
</body>
</html>
