<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AniTrack — аниме трекер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        @keyframes wave {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #eee);
            padding-bottom: 75px;
        }
        
        :root {
            --purple: #6c63ff;
            --lime: #a8ff35;
            --orange: #ff9f43;
            --gray: #2d2d44;
            --dark: #1a1a2e;
        }
        
        .header {
            background: linear-gradient(135deg, var(--purple) 0%, var(--dark) 100%);
            padding: 20px 16px;
            margin-bottom: 16px;
            position: relative;
        }
        .header h1 { font-size: 24px; }
        .header h1 span { color: var(--lime); }
        .header p { font-size: 13px; opacity: 0.8; margin-top: 4px; }
        
        .share-header-btn {
            position: absolute;
            top: 20px;
            right: 16px;
            background: var(--orange);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
        }
        
        .search-section {
            padding: 0 16px 16px;
        }
        .search-box {
            background: var(--gray);
            border-radius: 16px;
            display: flex;
            gap: 8px;
            padding: 8px;
            margin-bottom: 12px;
        }
        .search-box input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: var(--dark);
            color: #eee;
            font-size: 15px;
            outline: none;
        }
        .search-box button {
            background: var(--lime);
            border: none;
            padding: 0 20px;
            border-radius: 12px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
        }
        
        .search-results {
            padding: 0 16px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 12px;
        }
        .search-item {
            background: var(--gray);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            animation: fadeIn 0.3s ease;
        }
        .search-item:active { transform: scale(0.98); }
        .search-img {
            width: 50px;
            height: 70px;
            background: linear-gradient(135deg, var(--purple) 0%, var(--dark) 100%);
            border-radius: 10px;
            object-fit: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .search-info { flex: 1; }
        .search-title { font-weight: bold; font-size: 15px; margin-bottom: 4px; }
        .search-details { font-size: 11px; opacity: 0.7; }
        .search-actions {
            display: flex;
            flex-direction: column;
            gap: 5px;
            justify-content: center;
        }
        .search-actions button {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 11px;
            border: none;
            cursor: pointer;
        }
        .action-plan { background: var(--purple); color: white; }
        .action-completed { background: var(--orange); color: white; }
        
        .tabs {
            display: flex;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--gray);
            padding: 8px 0 12px;
            justify-content: space-around;
            z-index: 100;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            color: #888;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
        }
        .tab-btn.active {
            color: var(--lime);
            background: rgba(168, 255, 53, 0.1);
        }
        .tab-icon { font-size: 22px; }
        .tab-content { display: none; padding: 0 16px 80px; }
        .tab-content.active { display: block; }
        
        .anime-card {
            background: var(--gray);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: 0.2s;
            animation: fadeIn 0.3s ease;
        }
        .anime-card:active { transform: scale(0.98); }
        .anime-header {
            display: flex;
            gap: 15px;
        }
        .anime-poster {
            width: 80px;
            height: 110px;
            background: linear-gradient(135deg, var(--purple) 0%, var(--dark) 100%);
            border-radius: 12px;
            object-fit: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }
        .anime-info { flex: 1; }
        .anime-title { font-size: 18px; font-weight: bold; margin-bottom: 6px; }
        .anime-genres {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0;
        }
        .genre-tag {
            background: rgba(168, 255, 53, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            color: var(--lime);
        }
        .anime-desc {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 8px;
            line-height: 1.4;
        }
        .anime-rating {
            display: flex;
            align-items: center;
            gap: 4px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .star {
            font-size: 20px;
            cursor: pointer;
            color: #555;
            transition: 0.1s;
        }
        .star.active { color: var(--lime); }
        .star.wave {
            animation: wave 0.3s ease;
        }
        .card-buttons { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
        .card-buttons button {
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }
        .btn-primary { background: var(--lime); color: #1a1a2e; }
        .btn-warning { background: var(--orange); color: #1a1a2e; }
        .btn-danger { background: #ff4757; color: white; }
        .btn-secondary { background: var(--purple); color: white; }
        
        .sort-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .sort-btn {
            background: var(--gray);
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            color: #aaa;
            font-size: 12px;
            cursor: pointer;
        }
        .sort-btn.active { background: var(--purple); color: white; }
        
        .random-btn {
            background: var(--orange);
            color: #1a1a2e;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            border: none;
            width: 100%;
            margin-bottom: 16px;
            cursor: pointer;
        }
        
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            opacity: 0.6;
        }
        .empty-state span { font-size: 48px; display: block; margin-bottom: 12px; }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: 0.2s;
            overflow-y: auto;
            padding: 20px;
        }
        .modal.show {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: var(--gray);
            border-radius: 24px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        .modal-close-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 32px;
            height: 32px;
            background: #ff4757;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            color: white;
            font-size: 18px;
            font-weight: bold;
        }
        .modal-content h3 { margin-bottom: 16px; color: var(--lime); padding-right: 30px; }
        .modal-poster {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--purple) 0%, var(--dark) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            min-height: 150px;
        }
        .modal-content textarea {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: var(--dark);
            color: white;
            margin: 12px 0;
            font-family: inherit;
        }
        .modal-buttons { display: flex; gap: 10px; margin-top: 16px; }
        .modal-buttons button { flex: 1; padding: 12px; border-radius: 12px; border: none; cursor: pointer; }
        .modal-save { background: var(--lime); color: #1a1a2e; }
        .modal-later { background: var(--orange); color: #1a1a2e; }
        
        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 250;
            opacity: 0;
            pointer-events: none;
            transition: 0.2s;
        }
        .confirm-modal.show {
            opacity: 1;
            pointer-events: auto;
        }
        .confirm-content {
            background: var(--gray);
            border-radius: 24px;
            padding: 24px;
            width: 280px;
            text-align: center;
        }
        .confirm-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .confirm-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
        }
        .confirm-yes { background: #ff4757; color: white; }
        .confirm-no { background: var(--gray); color: white; border: 1px solid #555; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--gray);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        .stat-number { font-size: 32px; font-weight: bold; color: var(--lime); }
        .stat-label { font-size: 12px; opacity: 0.7; margin-top: 4px; }
        .top-list { background: var(--gray); border-radius: 16px; padding: 12px; margin-bottom: 8px; }
        
        .toast {
            position: fixed;
            bottom: 90px;
            left: 16px;
            right: 16px;
            background: var(--lime);
            color: #1a1a2e;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            z-index: 150;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Ani<span>Track</span></h1>
    <p>Твой аниме-трекер</p>
    <button class="share-header-btn" id="shareListBtn">📤 Поделиться</button>
</div>

<div class="search-section">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Найти аниме...">
        <button id="searchBtn">Найти</button>
    </div>
    <div id="searchResults" class="search-results"></div>
</div>

<div class="tabs">
    <button class="tab-btn active" data-tab="plan"><span class="tab-icon">📋</span><span>В планах</span></button>
    <button class="tab-btn" data-tab="watching"><span class="tab-icon">🎬</span><span>Смотрю</span></button>
    <button class="tab-btn" data-tab="completed"><span class="tab-icon">✅</span><span>Просмотрено</span></button>
    <button class="tab-btn" data-tab="stats"><span class="tab-icon">📊</span><span>Статистика</span></button>
</div>

<div id="plan" class="tab-content active">
    <div class="sort-bar">
        <button class="sort-btn active" data-sort="date">📅 По дате</button>
        <button class="sort-btn" data-sort="name">🔤 По названию</button>
    </div>
    <button id="randomPlanBtn" class="random-btn">🎲 Случайное аниме из планов</button>
    <div id="planList"></div>
</div>

<div id="watching" class="tab-content">
    <div id="watchingList"></div>
</div>

<div id="completed" class="tab-content">
    <div class="sort-bar">
        <button class="sort-btn active" data-sort="rating">⭐ По рейтингу</button>
        <button class="sort-btn" data-sort="name">🔤 По названию</button>
        <button class="sort-btn" data-sort="date">📅 По дате</button>
    </div>
    <div id="completedList"></div>
</div>

<div id="stats" class="tab-content">
    <div class="stats-grid" id="statsGrid"></div>
    <h3 style="margin: 16px 0 12px;">🏆 Топ-5 лучших</h3>
    <div id="topList"></div>
    <h3 style="margin: 16px 0 12px;">📊 По жанрам</h3>
    <div id="genreStats"></div>
</div>

<div id="toast" class="toast"></div>

<div id="animeModal" class="modal">
    <div class="modal-content">
        <button class="modal-close-btn" id="modalCloseBtn">✕</button>
        <div id="modalPoster" class="modal-poster">🎬</div>
        <h3 id="modalTitle"></h3>
        <div id="modalGenres" class="anime-genres"></div>
        <p id="modalDesc" style="font-size: 13px; line-height: 1.4;"></p>
        <div id="modalRatingStars" class="anime-rating" style="justify-content: center;"></div>
        <textarea id="modalReviewInput" rows="3" placeholder="Твоё мнение..."></textarea>
        <div class="modal-buttons" id="modalButtons">
            <button id="modalSaveBtn" class="modal-save">💾 Сохранить</button>
            <button id="modalLaterBtn" class="modal-later">⏰ Позже</button>
        </div>
    </div>
</div>

<div id="confirmModal" class="confirm-modal">
    <div class="confirm-content">
        <p>🗑 Удалить это аниме?</p>
        <div class="confirm-buttons">
            <button id="confirmYes" class="confirm-yes">Да</button>
            <button id="confirmNo" class="confirm-no">Нет</button>
        </div>
    </div>
</div>

<script>
    let animeData = { plan: [], watching: [], completed: [] };
    let currentModalAnime = null;
    let currentModalList = null;
    let currentModalIsNew = false;
    let tempStars = 0;
    let pendingDelete = null;
    
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2000);
    }
    
    function loadData() {
        try {
            const saved = localStorage.getItem('anitrack_data');
            if (saved) {
                animeData = JSON.parse(saved);
            }
        } catch(e) {}
        renderAll();
    }
    
    function saveData() {
        localStorage.setItem('anitrack_data', JSON.stringify(animeData));
        renderAll();
    }
    
    function animateStar(starElement) {
        starElement.classList.add('wave');
        setTimeout(() => starElement.classList.remove('wave'), 300);
    }
    
    function ratingToStars(rating) {
        if (!rating) return '';
        let stars = '';
        for (let i = 1; i <= 10; i++) {
            stars += i <= rating ? '★' : '☆';
        }
        return stars;
    }
    
    function renderStarSelector(container, currentRating, onStarClick) {
        container.innerHTML = '';
        for (let i = 1; i <= 10; i++) {
            const star = document.createElement('span');
            star.textContent = '★';
            star.style.fontSize = '22px';
            star.style.cursor = 'pointer';
            star.style.color = (currentRating && i <= currentRating) ? '#a8ff35' : '#555';
            star.style.transition = '0.1s';
            star.onclick = () => {
                animateStar(star);
                onStarClick(i);
            };
            container.appendChild(star);
        }
    }
    
    // Получение картинки из нескольких источников
    async function getImageUrl(animeId, title) {
        // Пробуем через разные прокси
        const sources = [
            `https://shikimori.one/api/animes/${animeId}`,
            `https://api.anilibria.ru/v1/getTitle?id=${animeId}`,
            null
        ];
        
        try {
            const resp = await fetch(`https://shikimori.one/api/animes/${animeId}`);
            const data = await resp.json();
            if (data.image?.original) return data.image.original;
            if (data.image?.preview) return data.image.preview;
        } catch(e) {}
        
        // Если не работает, возвращаем null — покажем иконку
        return null;
    }
    
    async function fetchAnimeDetails(animeId) {
        try {
            const response = await fetch(`https://shikimori.one/api/animes/${animeId}`);
            const detail = await response.json();
            return {
                description: (detail.description_html || detail.description || '').replace(/<[^>]*>/g, '').slice(0, 500),
                genres: detail.genres?.map(g => g.russian || g.name) || [],
                image: detail.image?.original || detail.image?.preview || null
            };
        } catch(e) {
            return { description: '', genres: [], image: null };
        }
    }
    
    async function openAnimeCard(anime, listName, isNew = false) {
        currentModalAnime = anime;
        currentModalList = listName;
        currentModalIsNew = isNew;
        tempStars = anime.rating || 0;
        
        document.getElementById('modalTitle').textContent = anime.title;
        
        // Показываем картинку если есть
        const posterDiv = document.getElementById('modalPoster');
        if (anime.image && anime.image.startsWith('http')) {
            posterDiv.innerHTML = `<img src="${anime.image}" style="width:100%; height:100%; object-fit:cover; border-radius:16px;" onerror="this.parentElement.innerHTML='🎬'">`;
        } else {
            posterDiv.innerHTML = '🎬';
        }
        
        document.getElementById('modalDesc').textContent = anime.description || 'Нет описания';
        
        const genresDiv = document.getElementById('modalGenres');
        genresDiv.innerHTML = (anime.genres || []).map(g => `<span class="genre-tag">${escapeHtml(g)}</span>`).join('');
        
        const starsDiv = document.getElementById('modalRatingStars');
        renderStarSelector(starsDiv, tempStars, (rating) => {
            tempStars = rating;
            renderStarSelector(starsDiv, tempStars, arguments.callee);
        });
        
        document.getElementById('modalReviewInput').value = anime.review || '';
        
        // Прячем кнопку "Позже" если это не новое добавление
        const laterBtn = document.getElementById('modalLaterBtn');
        if (isNew) {
            laterBtn.style.display = 'block';
        } else {
            laterBtn.style.display = 'none';
        }
        
        document.getElementById('animeModal').classList.add('show');
    }
    
    function closeModal() {
        document.getElementById('animeModal').classList.remove('show');
        currentModalAnime = null;
        currentModalList = null;
        currentModalIsNew = false;
    }
    
    function saveModalRating() {
        if (!currentModalAnime) return;
        
        const review = document.getElementById('modalReviewInput').value;
        currentModalAnime.rating = tempStars;
        currentModalAnime.review = review || 'Без отзыва';
        
        if (!currentModalAnime.completedDate && currentModalList === 'completed') {
            currentModalAnime.completedDate = new Date().toISOString();
        }
        
        saveData();
        closeModal();
        showToast(`⭐ Оценка сохранена!`);
    }
    
    async function addAnimeWithStatus(anime, status) {
        if (animeData.plan.some(a => a.title === anime.title) ||
            animeData.watching.some(a => a.title === anime.title) ||
            animeData.completed.some(a => a.title === anime.title)) {
            showToast(`❌ "${anime.title}" уже в списке`);
            return false;
        }
        
        let fullData = {};
        if (anime.id) {
            fullData = await fetchAnimeDetails(anime.id);
        }
        
        const newAnime = {
            id: Date.now(),
            title: anime.title,
            image: fullData.image || null,
            description: anime.description || fullData.description,
            genres: anime.genres || fullData.genres || [],
            kind: anime.kind,
            episodes: anime.episodes,
            shikimoriId: anime.id,
            addedDate: new Date().toISOString()
        };
        
        if (status === 'plan') {
            animeData.plan.push(newAnime);
            showToast(`✅ "${anime.title}" добавлен в планы!`);
            openAnimeCard(newAnime, 'plan', true);
        } else if (status === 'completed') {
            newAnime.completedDate = new Date().toISOString();
            newAnime.rating = null;
            newAnime.review = null;
            animeData.completed.push(newAnime);
            showToast(`✅ "${anime.title}" добавлен в просмотренные!`);
            openAnimeCard(newAnime, 'completed', true);
        }
        
        saveData();
        return true;
    }
    
    async function searchAnime(query) {
        if (!query.trim()) return [];
        const resultsDiv = document.getElementById('searchResults');
        resultsDiv.innerHTML = '<div class="empty-state" style="padding:20px;">🔍 Ищем...</div>';
        
        try {
            const url = `https://shikimori.one/api/animes?search=${encodeURIComponent(query)}&limit=15`;
            const resp = await fetch(url);
            const data = await resp.json();
            
            if (!data.length) {
                resultsDiv.innerHTML = '<div class="empty-state">😔 Ничего не найдено</div>';
                return [];
            }
            
            const detailed = await Promise.all(data.map(async (anime) => {
                try {
                    const detailResp = await fetch(`https://shikimori.one/api/animes/${anime.id}`);
                    const detail = await detailResp.json();
                    return {
                        id: anime.id,
                        title: anime.russian || anime.name,
                        image: detail.image?.original || detail.image?.preview || null,
                        description: (detail.description_html || detail.description || '').replace(/<[^>]*>/g, '').slice(0, 500),
                        genres: detail.genres?.map(g => g.russian || g.name) || [],
                        kind: anime.kind,
                        episodes: anime.episodes,
                        score: anime.score
                    };
                } catch(e) {
                    return {
                        id: anime.id,
                        title: anime.russian || anime.name,
                        image: null,
                        description: '',
                        genres: [],
                        kind: anime.kind,
                        episodes: anime.episodes
                    };
                }
            }));
            
            resultsDiv.innerHTML = detailed.map(anime => `
                <div class="search-item">
                    <div class="search-img" style="background: linear-gradient(135deg, var(--purple) 0%, var(--dark) 100%); display:flex; align-items:center; justify-content:center; font-size:24px;">
                        🎬
                    </div>
                    <div class="search-info">
                        <div class="search-title">${escapeHtml(anime.title)}</div>
                        <div class="search-details">${anime.kind || '?'} • ${anime.episodes || '?'} серий • ★ ${anime.score || '?'}</div>
                    </div>
                    <div class="search-actions">
                        <button class="action-plan" onclick='addWithStatus(${JSON.stringify(anime).replace(/'/g, "&#39;")}, "plan")'>📋 В планы</button>
                        <button class="action-completed" onclick='addWithStatus(${JSON.stringify(anime).replace(/'/g, "&#39;")}, "completed")'>✅ Просмотрено</button>
                    </div>
                </div>
            `).join('');
            return detailed;
        } catch(e) {
            resultsDiv.innerHTML = '<div class="empty-state">⚠️ Ошибка поиска</div>';
            return [];
        }
    }
    
    window.addWithStatus = function(anime, status) {
        addAnimeWithStatus(anime, status);
        document.getElementById('searchInput').value = '';
        document.getElementById('searchResults').innerHTML = '';
    };
    
    window.moveToWatching = function(id) {
        const index = animeData.plan.findIndex(a => a.id === id);
        if (index === -1) return;
        const anime = animeData.plan[index];
        animeData.watching.push({
            ...anime,
            startDate: new Date().toISOString()
        });
        animeData.plan.splice(index, 1);
        saveData();
        showToast(`🎬 "${anime.title}" — теперь смотрю!`);
    };
    
    window.completeFromWatching = function(id) {
        const index = animeData.watching.findIndex(a => a.id === id);
        if (index === -1) return;
        const anime = animeData.watching[index];
        anime.completedDate = new Date().toISOString();
        anime.rating = null;
        anime.review = null;
        animeData.completed.push(anime);
        animeData.watching.splice(index, 1);
        saveData();
        openAnimeCard(anime, 'completed', true);
    };
    
    function confirmDelete(list, id) {
        pendingDelete = { list, id };
        document.getElementById('confirmModal').classList.add('show');
    }
    
    document.getElementById('confirmYes').onclick = () => {
        if (pendingDelete) {
            const { list, id } = pendingDelete;
            const index = animeData[list].findIndex(a => a.id === id);
            if (index !== -1) {
                const title = animeData[list][index].title;
                animeData[list].splice(index, 1);
                saveData();
                showToast(`🗑 "${title}" удалено`);
            }
            pendingDelete = null;
        }
        document.getElementById('confirmModal').classList.remove('show');
    };
    
    document.getElementById('confirmNo').onclick = () => {
        pendingDelete = null;
        document.getElementById('confirmModal').classList.remove('show');
    };
    
    window.deleteAnime = function(list, id) {
        confirmDelete(list, id);
    };
    
    function shareList() {
        const listText = animeData.completed.map(a => `• ${a.title} — ${ratingToStars(a.rating)} (${a.rating || '?'}/10) — ${a.review || 'без отзыва'}`).join('\n');
        const message = `🎬 *Мой список просмотренных аниме:*\n\n${listText || 'Пока пусто'}\n\n📊 Всего: ${animeData.completed.length} аниме`;
        
        if (navigator.share) {
            navigator.share({ title: 'Мой список аниме', text: message });
        } else {
            navigator.clipboard.writeText(message);
            showToast('📋 Список скопирован!');
        }
    }
    
    function randomFromPlan() {
        if (animeData.plan.length === 0) {
            showToast('📭 В планах ничего нет!');
            return;
        }
        const random = animeData.plan[Math.floor(Math.random() * animeData.plan.length)];
        showToast(`🎲 Случайное аниме: "${random.title}"`);
    }
    
    let currentPlanSort = 'date';
    let currentCompletedSort = 'rating';
    
    function sortAnime(list, sortType) {
        const sorted = [...list];
        if (sortType === 'name') {
            sorted.sort((a, b) => a.title.localeCompare(b.title));
        } else if (sortType === 'date') {
            sorted.sort((a, b) => new Date(b.addedDate) - new Date(a.addedDate));
        } else if (sortType === 'rating') {
            sorted.sort((a, b) => (b.rating || 0) - (a.rating || 0));
        }
        return sorted;
    }
    
    function renderAll() {
        const planContainer = document.getElementById('planList');
        const sortedPlan = sortAnime(animeData.plan, currentPlanSort);
        if (sortedPlan.length === 0) {
            planContainer.innerHTML = '<div class="empty-state"><span>📭</span><br>Добавь аниме через поиск!</div>';
        } else {
            planContainer.innerHTML = sortedPlan.map(anime => `
                <div class="anime-card" onclick="openAnimeCard(animeData.plan.find(a=>a.id===${anime.id}), 'plan', false)">
                    <div class="anime-header">
                        <div class="anime-poster" style="display:flex; align-items:center; justify-content:center; font-size:32px;">
                            🎬
                        </div>
                        <div class="anime-info">
                            <div class="anime-title">${escapeHtml(anime.title)}</div>
                            <div class="anime-genres">${(anime.genres || []).slice(0,3).map(g => `<span class="genre-tag">${escapeHtml(g)}</span>`).join('')}</div>
                            <div class="anime-desc">${escapeHtml(anime.description?.slice(0, 80) || 'Нет описания')}...</div>
                        </div>
                    </div>
                    <div class="card-buttons" onclick="event.stopPropagation()">
                        <button class="btn-primary" onclick="moveToWatching(${anime.id})">🎬 Смотреть</button>
                        <button class="btn-danger" onclick="deleteAnime('plan', ${anime.id})">🗑</button>
                    </div>
                </div>
            `).join('');
        }
        
        const watchingContainer = document.getElementById('watchingList');
        if (animeData.watching.length === 0) {
            watchingContainer.innerHTML = '<div class="empty-state"><span>🎬</span><br>Нет аниме в процессе</div>';
        } else {
            watchingContainer.innerHTML = animeData.watching.map(anime => `
                <div class="anime-card" onclick="openAnimeCard(animeData.watching.find(a=>a.id===${anime.id}), 'watching', false)">
                    <div class="anime-header">
                        <div class="anime-poster" style="display:flex; align-items:center; justify-content:center; font-size:32px;">
                            🎬
                        </div>
                        <div class="anime-info">
                            <div class="anime-title">${escapeHtml(anime.title)}</div>
                            <div class="anime-desc">${escapeHtml(anime.description?.slice(0, 80) || 'Нет описания')}...</div>
                        </div>
                    </div>
                    <div class="card-buttons" onclick="event.stopPropagation()">
                        <button class="btn-primary" onclick="completeFromWatching(${anime.id})">✅ Просмотрено</button>
                        <button class="btn-danger" onclick="deleteAnime('watching', ${anime.id})">🗑</button>
                    </div>
                </div>
            `).join('');
        }
        
        const sortedCompleted = sortAnime(animeData.completed, currentCompletedSort);
        const completedContainer = document.getElementById('completedList');
        if (sortedCompleted.length === 0) {
            completedContainer.innerHTML = '<div class="empty-state"><span>✅</span><br>Здесь будут просмотренные аниме</div>';
        } else {
            completedContainer.innerHTML = sortedCompleted.map(anime => `
                <div class="anime-card" onclick="openAnimeCard(animeData.completed.find(a=>a.id===${anime.id}), 'completed', false)">
                    <div class="anime-header">
                        <div class="anime-poster" style="display:flex; align-items:center; justify-content:center; font-size:32px;">
                            🎬
                        </div>
                        <div class="anime-info">
                            <div class="anime-title">${escapeHtml(anime.title)}</div>
                            <div class="anime-genres">${(anime.genres || []).slice(0,3).map(g => `<span class="genre-tag">${escapeHtml(g)}</span>`).join('')}</div>
                            <div class="anime-rating">${ratingToStars(anime.rating)} (${anime.rating || '?'}/10)</div>
                            ${anime.review ? `<div class="anime-desc">💬 ${escapeHtml(anime.review.slice(0, 60))}...</div>` : ''}
                        </div>
                    </div>
                    <div class="card-buttons" onclick="event.stopPropagation()">
                        <button class="btn-danger" onclick="deleteAnime('completed', ${anime.id})">🗑</button>
                    </div>
                </div>
            `).join('');
        }
        
        const statsGrid = document.getElementById('statsGrid');
        const ratedAnime = animeData.completed.filter(c => c.rating);
        const avgRating = ratedAnime.reduce((a,b) => a + (b.rating || 0), 0) / (ratedAnime.length || 1);
        
        statsGrid.innerHTML = `
            <div class="stat-card"><div class="stat-number">${animeData.plan.length}</div><div class="stat-label">В планах</div></div>
            <div class="stat-card"><div class="stat-number">${animeData.watching.length}</div><div class="stat-label">Смотрю</div></div>
            <div class="stat-card"><div class="stat-number">${animeData.completed.length}</div><div class="stat-label">Просмотрено</div></div>
            <div class="stat-card"><div class="stat-number">${ratedAnime.length}</div><div class="stat-label">Оценено</div></div>
        `;
        
        document.getElementById('topList').innerHTML = `
            <div class="stat-card" style="margin-bottom:12px;"><div class="stat-number">${avgRating.toFixed(1)}</div><div class="stat-label">Средняя оценка</div></div>
            ${ratedAnime.sort((a,b) => (b.rating || 0) - (a.rating || 0)).slice(0,5).map(a => `
                <div class="top-list">${escapeHtml(a.title)} ${ratingToStars(a.rating)} (${a.rating}/10)</div>
            `).join('') || '<div class="empty-state">Нет оценённых аниме</div>'}
        `;
        
        const genreMap = {};
        [...animeData.plan, ...animeData.watching, ...animeData.completed].forEach(a => {
            (a.genres || []).forEach(g => {
                genreMap[g] = (genreMap[g] || 0) + 1;
            });
        });
        document.getElementById('genreStats').innerHTML = Object.entries(genreMap).slice(0,10).map(([g, count]) => `
            <div class="top-list">${escapeHtml(g)} — ${count} аниме</div>
        `).join('') || '<div class="empty-state">Нет жанров</div>';
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    document.getElementById('searchBtn').onclick = () => searchAnime(document.getElementById('searchInput').value);
    document.getElementById('randomPlanBtn').onclick = randomFromPlan;
    document.getElementById('shareListBtn').onclick = shareList;
    document.getElementById('modalSaveBtn').onclick = saveModalRating;
    document.getElementById('modalLaterBtn').onclick = closeModal;
    document.getElementById('modalCloseBtn').onclick = closeModal;
    
    document.querySelectorAll('.sort-btn[data-sort]').forEach(btn => {
        btn.onclick = () => {
            const sort = btn.dataset.sort;
            const parent = btn.closest('.tab-content').id;
            if (parent === 'plan') {
                currentPlanSort = sort;
                document.querySelectorAll('#plan .sort-btn').forEach(b => b.classList.remove('active'));
            } else if (parent === 'completed') {
                currentCompletedSort = sort;
                document.querySelectorAll('#completed .sort-btn').forEach(b => b.classList.remove('active'));
            }
            btn.classList.add('active');
            renderAll();
        };
    });
    
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.onclick = () => {
            const tabId = btn.dataset.tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            renderAll();
        };
    });
    
    window.openAnimeCard = openAnimeCard;
    
    loadData();
    showToast('🔥 Нажми на любое аниме, чтобы открыть карточку!');
</script>
</body>
</html>
